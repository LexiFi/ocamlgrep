#
# CircleCI configuration. Runs each time we push a new commit to GitHub.
#
# This builds the project and runs tests on Linux for all supported minor
# versions of OCaml. A single branch (with cppo for conditional compilation)
# covers all versions.
#

version: 2.1

orbs:
  win: circleci/windows@5.1.0

commands:
  build:
    parameters:
      ocaml_version:
        type: string
    steps:
      - checkout
      - run:
          name: Set weekly cache key segment
          command: |
            echo $(( $(date +%s) / 604800 )) > week_id.txt
            echo $(( $(date +%s) / 604800 - 1 )) > previous_week_id.txt
      - restore_cache:
          keys:
            - opam-ubuntu-<< parameters.ocaml_version >>-v1-{{ checksum "week_id.txt" }}
            - opam-ubuntu-<< parameters.ocaml_version >>-v1-{{ checksum "previous_week_id.txt" }}
      - run:
          name: Install system dependencies
          command: ./.circleci/setup-system
      - run:
          name: Install opam dependencies
          command: ./.circleci/setup-opam
      - save_cache:
          key: opam-ubuntu-<< parameters.ocaml_version >>-v1-{{ checksum "week_id.txt" }}
          paths:
            - ~/.opam
      - run:
          name: Build
          command: opam exec -- dune build
      - run:
          # Run the tests outside of Dune since we want to build the
          # test project with Dune and scan it with ocamlgrep
          # from outside the Dune build context.
          name: Test
          command: opam exec -- make test

jobs:
  linux_build:
    parameters:
      ocaml_version:
        type: string
    docker:
      - image: ocaml/opam:ubuntu-24.04-ocaml-<< parameters.ocaml_version >>
    working_directory: ~/ocamlgrep
    steps:
      - build:
          ocaml_version: << parameters.ocaml_version >>

  windows_build:
    parameters:
      ocaml_version:
        type: string
    executor:
      name: win/default
    steps:
      - run:
          name: "Enable Git symlinks"
          command: git config --global core.symlinks true

      - checkout

      - run:
          name: Set weekly cache key segment
          shell: bash.exe
          command: |
            echo $(( $(date +%s) / 604800 )) > week_id.txt
            echo $(( $(date +%s) / 604800 - 1 )) > previous_week_id.txt

      - restore_cache:
          keys:
            - opam-win-<< parameters.ocaml_version >>-pkgs-v1-{{ checksum "week_id.txt" }}
            - opam-win-<< parameters.ocaml_version >>-pkgs-v1-{{ checksum "previous_week_id.txt" }}
            - opam-win-<< parameters.ocaml_version >>-v1

      - run:
          name: Install Opam
          shell: bash.exe
          command: |
            url="https://github.com/ocaml/opam/releases/download/2.4.1/opam-2.4.1-x86_64-windows.exe"
            dst="$HOME/AppData/Local/Microsoft/WindowsApps/opam"
            curl -L "$url" -o "$dst"
            opam --version

      - run:
          name: Set up OCaml and opam environment
          shell: bash.exe
          no_output_timeout: 30m
          environment:
            OPAMROOT: "C:\\Users\\circleci\\AppData\\Local\\opam"
            OCAML_COMPILER: << parameters.ocaml_version >>
          command: |
            if [[ -d ~/AppData/Local/opam ]]; then
              echo "Using cached opam switch"
            else
              opam init --compiler="$OCAML_COMPILER" -y --debug
            fi

      - save_cache:
          key: opam-win-<< parameters.ocaml_version >>-v1
          paths:
            - ~/AppData/Local/opam

      - run:
          name: Install dependencies
          shell: bash.exe
          command: |
            opam install ./ocamlgrep-lib.opam ./ocamlgrep.opam -y --deps-only --with-test

      - save_cache:
          key: opam-win-<< parameters.ocaml_version >>-pkgs-v1-{{ checksum "week_id.txt" }}
          paths:
            - ~/AppData/Local/opam

      - run:
          name: Build
          shell: bash.exe
          command: opam exec -- dune build

      - run:
          name: Test
          shell: bash.exe
          command: |
            # Copied from the makefile (please keep it in sync and simple)
            opam exec -- dune build
            opam exec -- dune runtest
            (cd tests/proj && opam exec -- dune build @check --root . )
            opam exec -- _build/default/tests/test.exe

workflows:
  version: 2
  build:
    jobs:
      - linux_build:
          matrix:
            parameters:
              ocaml_version:
                - "4.14"
                - "5.1"
                - "5.2"
                - "5.3"
                - "5.4"
                - "5.5"
      - windows_build:
          matrix:
            parameters:
              ocaml_version:
                - "5.5.0~beta1"
