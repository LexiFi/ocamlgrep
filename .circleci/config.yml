#
# CircleCI configuration. Runs each time we push a new commit to GitHub.
#
# This builds the project and runs tests on Linux and Windows
# for one specific minor version of OCaml (X.Y).
# Each minor OCaml version is supported in its own Git branch
# due to incompatibilities of compiler-libs from one version of OCaml
# to another. For example, the name of the branch for ocaml 5.2.1 is
# '502'.
#

# Version-specific settings. When updating the OCaml version or creating
# a new version branch, only this section needs to be changed.
x-versions:
  linux-image: &linux-image "ocaml/opam:ubuntu-24.04-ocaml-5.1"
  linux-ocaml: &linux-ocaml "5.1"
  win-ocaml: &win-ocaml "5.1.1"
  win-cache-restore-keys: &win-cache-restore-keys
    - 'opam-win-5.1.1-pkgs-v1-{{ checksum "week_id.txt" }}'
    - 'opam-win-5.1.1-pkgs-v1-{{ checksum "previous_week_id.txt" }}'
    - 'opam-win-5.1.1-v1'
  win-cache-ocaml-key: &win-cache-ocaml-key "opam-win-5.1.1-v1"
  win-cache-pkgs-key: &win-cache-pkgs-key 'opam-win-5.1.1-pkgs-v1-{{ checksum "week_id.txt" }}'

version: 2.1

orbs:
  win: circleci/windows@5.1.0

commands:
  build:
    parameters:
      ocaml_version:
        type: string
    steps:
      - checkout
      - run:
          name: Set weekly cache key segment
          command: |
            echo $(( $(date +%s) / 604800 )) > week_id.txt
            echo $(( $(date +%s) / 604800 - 1 )) > previous_week_id.txt
      - restore_cache:
          keys:
            - opam-ubuntu-<< parameters.ocaml_version >>-v1-{{ checksum "week_id.txt" }}
            - opam-ubuntu-<< parameters.ocaml_version >>-v1-{{ checksum "previous_week_id.txt" }}
      - run:
          name: Install system dependencies
          command: ./.circleci/setup-system
      - run:
          name: Install opam dependencies
          command: ./.circleci/setup-opam
      - save_cache:
          key: opam-ubuntu-<< parameters.ocaml_version >>-v1-{{ checksum "week_id.txt" }}
          paths:
            - ~/.opam
      - run:
          name: Build
          command: opam exec -- dune build
      - run:
          # Run the tests outside of Dune since we want to build the
          # test project with Dune and scan it with ocamlgrep
          # from outside the Dune build context.
          name: Test
          command: opam exec -- make test

jobs:
  linux_build:
    docker:
      - image: *linux-image
    working_directory: ~/ocamlgrep
    steps:
      - build:
          ocaml_version: *linux-ocaml

  windows_build:
    executor:
      name: win/default
    steps:
      - run:
          name: "Enable Git symlinks"
          command: git config --global core.symlinks true

      - checkout

      - run:
          name: Set weekly cache key segment
          shell: bash.exe
          command: |
            echo $(( $(date +%s) / 604800 )) > week_id.txt
            echo $(( $(date +%s) / 604800 - 1 )) > previous_week_id.txt

      - restore_cache:
          keys: *win-cache-restore-keys

      - run:
          name: Install Opam
          shell: bash.exe
          command: |
            url="https://github.com/ocaml/opam/releases/download/2.4.1/opam-2.4.1-x86_64-windows.exe"
            dst="$HOME/AppData/Local/Microsoft/WindowsApps/opam"
            curl -L "$url" -o "$dst"
            opam --version

      - run:
          name: Set up OCaml and opam environment
          shell: bash.exe
          no_output_timeout: 30m
          environment:
            OPAMROOT: "C:\\Users\\circleci\\AppData\\Local\\opam"
            OCAML_COMPILER: *win-ocaml
          command: |
            if [[ -d ~/AppData/Local/opam ]]; then
              echo "Using cached opam switch"
            else
              opam init --compiler="$OCAML_COMPILER" -y --debug
            fi

      - save_cache:
          key: *win-cache-ocaml-key
          paths:
            - ~/AppData/Local/opam

      - run:
          name: Install dependencies
          shell: bash.exe
          command: |
            opam install ./ocamlgrep-lib.opam ./ocamlgrep.opam -y --deps-only --with-test

      - save_cache:
          key: *win-cache-pkgs-key
          paths:
            - ~/AppData/Local/opam

      - run:
          name: Build
          shell: bash.exe
          command: opam exec -- dune build

      - run:
          name: Test
          shell: bash.exe
          command: |
            # Copied from the makefile (please keep it in sync and simple)
            opam exec -- dune build @check
            opam exec -- dune runtest
            opam exec -- _build/default/tests/test.exe

workflows:
  version: 2
  build:
    jobs:
      - linux_build
      - windows_build
